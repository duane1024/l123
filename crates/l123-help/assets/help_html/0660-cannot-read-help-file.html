<title>Cannot read Help file</title>
<h1>Cannot read Help file</h1>
<pre>Cannot read Help file

The Help file (123.HLP) may be damaged or may not be in the 1-2-3
program directory.

Check that you are reading the Help file provided by Lotus. If not,
find the 123.HLP file on your 1-2-3 disks and copy it to your
1-2-3 program directory.
