<title>Cannot undo this operation</title>
<h1>Cannot undo this operation</h1>
<pre>Cannot undo this operation

l123 cannot create an undo record for a formula you are erasing because
the formula is too long or complex. Pressing <a href="0440-alt-f4-undo.html">ALT-F4 (UNDO)</a> after you
erase the formula will not recover the formula.
