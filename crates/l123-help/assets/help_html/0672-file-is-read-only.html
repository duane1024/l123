<title>File is read/only</title>
<h1>File is read/only</h1>
<pre>File is read/only

You tried to save a file that was marked read-only on disk.

You cannot save data in a read-only file. At the DOS prompt, use the
DOS ATTRIB command to clear the read-only attribute from the file.
Then you can use <a href="0041-file-save.html">/File Save</a> to save the file.

<a href="0000-1-2-3-help-index.html">Help Index</a></pre>
