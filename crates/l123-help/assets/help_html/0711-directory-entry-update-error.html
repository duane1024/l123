<h1>Directory entry update error</h1>
<pre>Directory entry update error

You used <a href="0041-file-save.html">/File Save</a> or <a href="0045-file-xtract.html">/File Xtract</a> to save a file on disk, and the
network software did not update the directory.

Reconfigure the network so that directory updates are not deferred.
